<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>등가속도 직선 운동 프레임 분석</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --main: #2563eb; --accent: #f59e0b; --danger: #ef4444; --success: #10b981; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: #f1f5f9; color: #1e293b; }
        .card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 10px; }
        h3 { margin: 0 0 8px 0; font-size: 16px; color: var(--main); text-align: center; }
        
        .fps-selector { display: flex; align-items: center; justify-content: center; gap: 15px; background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .fps-option { display: flex; align-items: center; gap: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .fps-option input { cursor: pointer; width: 16px; height: 16px; }

        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
        button, label.file-label { padding: 8px 10px; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; font-size: 12px; }
        label.file-label { background: var(--main); }
        .btn-axis { background: #8b5cf6; }
        .btn-scale { background: var(--accent); }
        .btn-csv { background: #64748b; }
        .btn-undo { background: #94a3b8; }
        .btn-reset { background: var(--danger); }
        .btn-frame { background: var(--success); }
        .btn-save { background: #059669; }

        .canvas-container { background: black; border-radius: 8px; overflow: hidden; position: relative; margin-bottom: 10px; border: 2px solid #334155; }
        canvas { width: 100%; height: auto; touch-action: none; cursor: crosshair; display: block; }
        
        #captureArea { padding: 5px; border-radius: 8px; }
        .data-card { background: white; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .table-wrapper { overflow-x: auto; max-height: 180px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 400px; }
        th, td { border: 1px solid #e2e8f0; padding: 6px; text-align: center; }
        th { background: #f8fafc; position: sticky; top: 0; }
        
        .graph-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .graph-container { background: white; padding: 12px; border-radius: 12px; height: 320px; border: 1px solid #e2e8f0; }
        canvas.graph-canvas { background: #fff; width: 100% !important; height: 260px !important; }
        .status-bar { font-size: 12px; padding: 6px; border-radius: 6px; background: #f1f5f9; text-align: center; margin-bottom: 8px; border: 1px solid #cbd5e1; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3>🏃 등가속도 직선 운동 분석 v1.0 (함현고 2학년 수행평가용)</h3>
    <div class="status-bar" id="status">영상을 업로드하세요.</div>
    
    <div class="fps-selector">
        <span style="font-size: 12px; color: #64748b;">촬영 설정 선택:</span>
        <label class="fps-option">
            <input type="radio" name="fps" value="30" checked onclick="updateFPS(30)"> 30 FPS
        </label>
        <label class="fps-option">
            <input type="radio" name="fps" value="60" onclick="updateFPS(60)"> 60 FPS
        </label>
    </div>

    <div class="btn-group">
        <label for="upload" class="file-label">영상 선택</label>
        <input type="file" id="upload" accept="video/*" style="display:none">
        <button class="btn-axis" id="axisBtn" onclick="setMode('axis')" disabled>좌표축 설정</button>
        <button class="btn-scale" id="scaleBtn" onclick="setMode('scale')" disabled>가늠자 설정</button>
        <button class="btn-undo" onclick="undo()">되돌리기</button>
        <button class="btn-reset" onclick="location.reload()">초기화</button>
    </div>
    <div class="btn-group">
        <button class="btn-frame" onclick="moveFrame(-1)">◀ 이전 프레임</button>
        <button class="btn-frame" onclick="moveFrame(1)">다음 프레임 ▶</button>
        <button class="btn-csv" id="csvBtn" onclick="exportCSV()" disabled>CSV 복사</button>
        <button class="btn-save" id="saveBtn" onclick="saveAsImage()" disabled>📸 결과 사진 저장</button>
    </div>
</div>

<div class="canvas-container">
    <canvas id="mainCanvas"></canvas>
    <video id="video" style="display:none;" playsinline muted></video>
</div>

<div id="captureArea">
    <div class="data-card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>N</th><th>시간(s)</th><th>위치(m)</th><th>속도(m/s)</th><th>가속도(m/s²)</th></tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

    <div class="graph-grid">
        <div class="graph-container"><canvas id="stGraph" class="graph-canvas"></canvas></div>
        <div class="graph-container"><canvas id="vtGraph" class="graph-canvas"></canvas></div>
        <div class="graph-container"><canvas id="atGraph" class="graph-canvas"></canvas></div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const mainCanvas = document.getElementById('mainCanvas');
    const ctx = mainCanvas.getContext('2d');
    const status = document.getElementById('status');
    const tableBody = document.getElementById('dataTable');
    
    let mode = 'ready'; let axisLine = null; let scaleLine = null;
    let pixelsPerMeter = 1; let points = []; 
    let fps = 30; let frameTime = 1/30; let firstTimestamp = 0;
    let isSeeking = false; let isDrawing = false; let startPoint = null;

    function updateFPS(val) {
        fps = val;
        frameTime = 1 / fps;
        status.innerText = `설정 변경: ${fps} FPS (프레임 간격: ${frameTime.toFixed(4)}s)`;
    }

    document.getElementById('upload').onchange = (e) => {
        const file = e.target.files[0]; if (!file) return;
        video.src = URL.createObjectURL(file);
        video.onloadedmetadata = () => {
            mainCanvas.width = video.videoWidth; 
            mainCanvas.height = video.videoHeight;
            status.innerText = "영상이 로드되었습니다. 좌표축을 설정하세요.";
            ['axisBtn', 'scaleBtn', 'saveBtn'].forEach(id => document.getElementById(id).disabled = false);
            video.currentTime = 0;
            setTimeout(render, 100);
        };
    };

    function setMode(m) { mode = m; status.innerText = m === 'axis' ? "좌표축: 원점부터 운동방향으로 드래그" : "가늠자: 실제 길이를 아는 구간 드래그"; }

    // 마우스 이벤트 핸들러
    mainCanvas.onmousedown = (e) => handleStart(e);
    mainCanvas.onmousemove = (e) => handleMove(e);
    mainCanvas.onmouseup = (e) => handleEnd(e);

    // [수정된 부분] 터치 이벤트 핸들러 추가
    mainCanvas.ontouchstart = (e) => { e.preventDefault(); handleStart(e.touches[0]); };
    mainCanvas.ontouchmove = (e) => { e.preventDefault(); handleMove(e.touches[0]); };
    mainCanvas.ontouchend = (e) => { e.preventDefault(); handleEnd(e.changedTouches[0]); };

    // 공통 처리 로직
    function handleStart(e) {
        if (!video.src || isSeeking) return;
        const p = getMousePos(e);
        if (mode === 'analysis') recordPoint(p);
        else { isDrawing = true; startPoint = p; }
    }

    function handleMove(e) {
        if (!isDrawing) return;
        render();
        const cur = getMousePos(e);
        ctx.setLineDash([10, 10]); ctx.lineWidth = 4;
        ctx.strokeStyle = mode === 'axis' ? "#8b5cf6" : "#f59e0b";
        ctx.beginPath(); ctx.moveTo(startPoint.x, startPoint.y); ctx.lineTo(cur.x, cur.y); ctx.stroke();
        ctx.setLineDash([]);
    }

    function handleEnd(e) {
        if (!isDrawing) return;
        const p = getMousePos(e); isDrawing = false;
        const dist = Math.hypot(p.x - startPoint.x, p.y - startPoint.y);
        if (dist < 5) return;

        if (mode === 'axis') {
            axisLine = { x1: startPoint.x, y1: startPoint.y, x2: p.x, y2: p.y };
            status.innerText = "좌표축 완료. 가늠자를 드래그해서 설정하세요.";
        } else if (mode === 'scale') {
            const r = prompt("이 구간의 실제 길이(m)?", "0.5");
            if (r && !isNaN(r)) {
                pixelsPerMeter = dist / parseFloat(r);
                scaleLine = { x1: startPoint.x, y1: startPoint.y, x2: p.x, y2: p.y };
                mode = 'analysis';
                document.getElementById('csvBtn').disabled = false;
                status.innerText = "분석 모드: 물체를 클릭하면 1프레임씩 진행됩니다.";
            }
        }
        render();
    }

    function recordPoint(p) {
        if (!axisLine || isSeeking) return;
        if (points.length === 0) firstTimestamp = video.currentTime;
        const dx = axisLine.x2 - axisLine.x1; const dy = axisLine.y2 - axisLine.y1;
        const d2 = dx*dx + dy*dy; if (d2 === 0) return;
        const t = ((p.x - axisLine.x1) * dx + (p.y - axisLine.y1) * dy) / d2;
        const cx = axisLine.x1 + t * dx; const cy = axisLine.y1 + t * dy;
        points.push({ time: video.currentTime - firstTimestamp, absTime: video.currentTime, pos: Math.hypot(cx - axisLine.x1, cy - axisLine.y1) / pixelsPerMeter, x: cx, y: cy });
        moveFrame(1); updateUI();
    }

    function updateUI() {
        points.forEach((p, i) => { if (i > 0) p.v = (p.pos - points[i-1].pos) / (p.time - points[i-1].time || 0.001); else p.v = 0; });
        points.forEach((p, i) => { if (i > 1) p.a = (p.v - points[i-1].v) / (p.time - points[i-1].time || 0.001); else p.a = 0; });
        tableBody.innerHTML = points.map((p, i) => `<tr style="${i % 3 === 0 ? 'background:#f0f7ff; font-weight:bold;' : ''}"><td>${i}</td><td>${p.time.toFixed(4)}</td><td>${p.pos.toFixed(3)}</td><td>${(p.v||0).toFixed(3)}</td><td>${(p.a||0).toFixed(3)}</td></tr>`).join('');
        updateGraphs();
    }

    function moveFrame(d) {
        if (isSeeking) return; isSeeking = true;
        const nextTime = parseFloat((video.currentTime + (frameTime * d)).toFixed(6));
        video.currentTime = Math.max(0, Math.min(video.duration, nextTime));
        const onSeeked = () => { render(); isSeeking = false; video.removeEventListener('seeked', onSeeked); };
        video.addEventListener('seeked', onSeeked);
    }

    function render() {
        ctx.drawImage(video, 0, 0, mainCanvas.width, mainCanvas.height);
        if(scaleLine) { ctx.strokeStyle = "#f59e0b"; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(scaleLine.x1, scaleLine.y1); ctx.lineTo(scaleLine.x2, scaleLine.y2); ctx.stroke(); }
        if(axisLine) { ctx.strokeStyle = "rgba(139, 92, 246, 0.7)"; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(axisLine.x1, axisLine.y1); ctx.lineTo(axisLine.x2, axisLine.y2); ctx.stroke(); ctx.fillStyle = "#8b5cf6"; ctx.beginPath(); ctx.arc(axisLine.x1, axisLine.y1, 10, 0, Math.PI*2); ctx.fill(); }
        points.forEach((p, i) => { ctx.fillStyle = (i === points.length - 1) ? "#f59e0b" : "#ff0000"; ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill(); if (i % 3 === 0) { ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke(); } });
    }

    function getMousePos(e) { const r = mainCanvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * (mainCanvas.width / r.width), y: (e.clientY - r.top) * (mainCanvas.height / r.height) }; }

    function drawGraph(id, data, color, label) {
        const c = document.getElementById(id); const gctx = c.getContext('2d');
        const w = c.width = c.clientWidth * 2; const h = c.height = c.clientHeight * 2;
        if (data.length < 1) return;
        const pad = 100;
        const maxX = Math.max(...data.map(d => d.x), 0.1) * 1.1;
        const allY = data.map(d => d.y);
        const minY = Math.min(...allY, 0); const maxY = Math.max(...allY, 0.1) * 1.3;
        const rangeY = (maxY - minY) || 1;
        const getX = (x) => pad + (x / maxX) * (w - pad * 2);
        const getY = (y) => h - pad - ((y - minY) / rangeY) * (h - pad * 2);
        gctx.font = "bold 24px sans-serif"; gctx.fillStyle = "#475569"; gctx.fillText(label, pad, pad - 20);
        gctx.strokeStyle = "#94a3b8"; gctx.lineWidth = 2;
        gctx.beginPath(); gctx.moveTo(pad, pad); gctx.lineTo(pad, h-pad); gctx.lineTo(w-pad, h-pad); gctx.stroke();
        gctx.strokeStyle = color; gctx.lineWidth = 5; gctx.beginPath();
        data.forEach((p, i) => { if(i===0) gctx.moveTo(getX(p.x), getY(p.y)); else gctx.lineTo(getX(p.x), getY(p.y)); });
        gctx.stroke();
        data.forEach((p, i) => { if (i % 3 === 0) { const px = getX(p.x), py = getY(p.y); gctx.fillStyle = color; gctx.beginPath(); gctx.arc(px, py, 8, 0, Math.PI*2); gctx.fill(); gctx.fillStyle = "#1e293b"; gctx.fillText(p.y.toFixed(2), px + 10, py - 10); } });
    }

    function updateGraphs() {
        drawGraph("stGraph", points.map(p => ({x: p.time, y: p.pos})), "#2563eb", "Position(m)");
        drawGraph("vtGraph", points.map(p => ({x: p.time, y: p.v})), "#10b981", "Velocity(m/s)");
        drawGraph("atGraph", points.map(p => ({x: p.time, y: p.a})), "#ef4444", "Accel(m/s²)");
    }

    function saveAsImage() {
        if (points.length === 0) { alert("분석된 데이터가 없습니다."); return; }
        const userInput = prompt("학번-이름을 입력하세요.", "20101-홍길동");
        if (userInput === null) return; 
        const nameTag = userInput.trim() === "" ? "미입력" : userInput.trim();
        const finalFileName = `등가속도 직선 운동 분석 그래프(${nameTag})`;
        const target = document.getElementById('captureArea');
        const originalBg = target.style.backgroundColor;
        target.style.backgroundColor = "white"; 
        status.innerText = "이미지 생성 및 저장 중...";
        html2canvas(target, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = `${finalFileName}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            target.style.backgroundColor = originalBg;
            status.innerText = "저장 완료! (파일명: " + finalFileName + ")";
        });
    }

    function undo() { points.pop(); if(points.length > 0) video.currentTime = points[points.length-1].absTime; render(); updateUI(); }
    function exportCSV() {
        let csv = "N,Time(s),Position(m),Velocity(m/s),Accel(m/s2)\n";
        points.forEach((p, i) => { csv += `${i},${p.time.toFixed(4)},${p.pos.toFixed(3)},${(p.v||0).toFixed(3)},${(p.a||0).toFixed(3)}\n`; });
        navigator.clipboard.writeText(csv).then(() => alert("CSV 복사 완료!"));
    }
</script>
</body>
</html>
